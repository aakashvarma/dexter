# Articulated asset pipeline configuration.
# Read by the orchestrator agent. Paths are relative to the repo root.
# Models are not configured here: OpenCode subagents use your logged-in
# OpenCode model (Codex OAuth).

paths:
  input_dir: input_images          # where input images live
  intermediate_root: .intermediate  # per-asset / per-run output tree
  schemas_dir: schemas             # JSON Schema files used by the validator
  tool_scripts_dir: tool_scripts   # deterministic step scripts
  blender_binary: blender          # blender executable on PATH

loop:
  min_loops: 1                     # always run at least this many iterations
  max_loops: 5                     # hard cap on iterations
  score_threshold: 85              # stop once critic score reaches this
  max_validation_retries: 2        # re-invoke a subagent this many times on schema failure
  no_improvement_patience: 2       # stop if the best score does not improve for this many iterations

image_generation:
  background_instruction: "Isolate only this part, centered on a plain white background, with no other parts visible."
  model: "gpt-image-2"   # OpenAI image model (gpt-image-2 or dall-e-3)
  size: "1024x1024"       # "1024x1024" | "1536x1024" | "1024x1536"
  quality: "medium"       # "low" | "medium" | "high"

fal:                               # templated into fal_image_to_3d.json
  endpoint: fal-ai/hunyuan-3d/v3.1/pro/image-to-3d
  generate_type: Normal
  enable_pbr: true
  face_count: 40000               # fal minimum; visual GLBs are simplified later for Isaac Sim collision
  download_timeout_seconds: 300
  image_extensions: [".png", ".jpg", ".jpeg", ".webp"]

render:                            # render defaults (critic plans the cameras)
  resolution: [1920, 1080]
  samples: 64
  engine: CYCLES
  file_format: PNG

urdf:                              # mesh-simplify + URDF export settings
  target_faces: 2000               # collision mesh; matches physics convex_decomposition_max_polys

physics:                           # Isaac Sim (PhysX) USD export defaults
  root_prim_path: /World/Robot     # USD prim that all geometry nests under
  gravity_direction: [0, 0, -1]    # Z-up world (matches Blender + Isaac Sim)
  gravity_magnitude: 9.81          # m/s^2
  collision:                       # poly-count thresholds the physics_spec agent uses
    convex_hull_max_polys: 100     # <= this -> convexHull
    convex_decomposition_max_polys: 2000  # <= this -> convexDecomposition; above -> none
  material:                        # default physics material coefficients
    static_friction: 0.6
    dynamic_friction: 0.4
    restitution: 0.0
  drive:                           # default PD drive for articulated joints
    stiffness: 0.0                 # 0 + damping = velocity drive; >0 = position drive
    damping: 1000.0
    max_force: 500.0
