[tool.ruff]
target-version = "py311"
line-length = 100
src = ["tool_scripts"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "N",   # pep8-naming
]
ignore = [
    "N802",  # Blender RNA operator names (e.g. usd_export)
    "N806",  # allow math symbols in tight geometry blocks when needed
]

[tool.ruff.lint.per-file-ignores]
"tool_scripts/blender_*.py" = ["E402", "F401"]  # path bootstrap before bpy/common; bpy only in Blender

[tool.ruff.lint.isort]
known-first-party = ["common"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
